title: Doppio Architecture
tagline: Studio d'architecture
description: >-
  Doppio Architecture — studio d'architecture indépendant. Conception, rénovation
  et aménagement d'espaces résidentiels, tertiaires et culturels.
author: Doppio Architecture
email: contact@doppioarchitecture.com
architects:
  - name: Anna Gascoin-Durlinger
    role: Architecte associée
    email: anna@doppioarchitecture.com
    phone: "+33 (0)6 79 40 79 60"
  - name: Jean Lepetit
    role: Architecte associé
    email: jean@doppioarchitecture.com
    phone: "+33 (0)6 64 48 50 21"
url: "https://doppioarchitecture.com"
baseurl: ""

# Construction
markdown: kramdown
permalink: /:title/
timezone: Europe/Paris

# Plugins (compatibles GitHub Pages)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  projects:
    output: true
    permalink: /projets/:path/

defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - DEPLOIEMENT.md
  - vendor
  - node_modules
  - _brand

# Navigation principale
nav:
  - title: Accueil
    url: /
  - title: À propos
    url: /a-propos/
  - title: Projets
    url: /projets/
  - title: Contact
    url: /contact/

# Réseaux / contact (à compléter)
social:
  instagram: ""
  linkedin: ""
