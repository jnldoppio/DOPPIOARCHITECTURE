---
layout: default
title: Projets
permalink: /projets/
---

<section class="page-hero">
  <h1 class="page-title">Projets</h1>
</section>

<section style="padding: 0 var(--pad-x) 6rem;">
  <div class="projects-grid" style="margin-top: 0;">
    {% assign all_projects = site.projects | sort: 'year' | reverse %}
    {% for project in all_projects %}
      <a class="project-card" href="{{ project.url | relative_url }}">
        <div class="project-thumb"{% if project.cover and project.cover != "" %} style="background-image: url('{{ project.cover | relative_url }}');"{% endif %}></div>
        <div class="project-info">
          <h3>{{ project.title }}</h3>
          <p class="meta">{{ project.location }}{% if project.year %} — {{ project.year }}{% endif %}</p>
        </div>
      </a>
    {% endfor %}
  </div>
</section>
