---
layout: default
title: Contact
permalink: /contact/
---

<section class="page-hero">
  <h1 class="page-title">Contact</h1>
</section>

<div class="contact-grid">
  <div class="contact-info">
    <div class="contact-block">
      <span class="contact-label">Email</span>
      <p class="contact-value" style="margin: 0;">
        <a href="mailto:hello@doppioarchitecture.com">hello@doppioarchitecture.com</a>
      </p>
    </div>
    <div class="contact-block">
      <span class="contact-label">Adresse</span>
      <p class="contact-value" style="margin: 0;">Lille — Strasbourg — Caen</p>
    </div>
  </div>

  <form class="contact-form" action="https://formspree.io/f/VOTRE_ID" method="POST">
    <label for="name">Nom</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="subject">Sujet</label>
    <input type="text" id="subject" name="subject">

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" required></textarea>

    <button type="submit">Envoyer</button>
  </form>
</div>
